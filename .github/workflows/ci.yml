name: CI
on:
  # Temporarily manual-only while CI environment failures are investigated.
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: {POSTGRES_USER: test, POSTGRES_PASSWORD: test, POSTGRES_DB: ads_erp_test}
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      APP_NAME: ADS ERP Test
      APP_ENV: test
      SECRET_KEY: ci-only-secret
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ads_erp_test
      DB_USER: test
      DB_PASSWORD: test
      HOST: 127.0.0.1
      PORT: 8000
      SESSION_HTTPS_ONLY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12', cache: pip}
      - run: pip install -r requirements-dev.txt
      - run: alembic upgrade head
      - run: pytest --cov=app --cov-report=term-missing
      - run: python -m compileall -q app main.py
