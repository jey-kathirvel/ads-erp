{% extends "layouts/base.html" %}

{% block content %}

<form method="post">

<div class="card">

<div class="card-header bg-primary">

<h3>

Create Account

</h3>

</div>

<div class="card-body">

<div class="form-group">

<label>

Account Name

</label>

<input

name="account_name"

class="form-control"

required>

</div>

<div class="form-group">

<label>

Account Group

</label>

<select

name="account_group"

class="form-control">

<option>Assets</option>

<option>Liabilities</option>

<option>Income</option>

<option>Expense</option>

</select>

</div>

<div class="form-group">

<label>

Opening Balance

</label>

<input

name="opening_balance"

type="number"

step="0.01"

value="0"

class="form-control">

</div>

</div>

<div class="card-footer">

<button

class="btn btn-success">

Save Account

</button>

</div>

</div>

</form>

{% endblock %}
