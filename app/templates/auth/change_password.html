{% extends "layouts/base.html" %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-lg-6 col-xl-5">
        <div class="card shadow-sm border-0 password-card">
            <div class="card-header bg-white border-0 pt-4 px-4">
                <div class="password-icon"><i class="fas fa-key"></i></div>
                <h1 class="h3 font-weight-bold mb-1">Change Password</h1>
                <p class="text-muted mb-0">Protect your ADS ERP account with a strong password.</p>
            </div>

            <div class="card-body px-4 pb-4">
                {% if message %}
                <div class="alert alert-{{ 'success' if success else 'danger' }}" role="alert">
                    <i class="fas fa-{{ 'check-circle' if success else 'exclamation-circle' }} mr-2"></i>{{ message }}
                </div>
                {% endif %}

                {% if not success %}
                <form method="post" action="/change-password" id="changePasswordForm">
                    <div class="form-group">
                        <label for="current_password">Current Password</label>
                        <div class="input-group password-field">
                            <input type="password" id="current_password" name="current_password" class="form-control" autocomplete="current-password" required autofocus>
                            <div class="input-group-append"><button type="button" class="btn btn-outline-secondary password-toggle" aria-label="Show password"><i class="far fa-eye"></i></button></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="new_password">New Password</label>
                        <div class="input-group password-field">
                            <input type="password" id="new_password" name="new_password" class="form-control" minlength="8" autocomplete="new-password" required>
                            <div class="input-group-append"><button type="button" class="btn btn-outline-secondary password-toggle" aria-label="Show password"><i class="far fa-eye"></i></button></div>
                        </div>
                        <small class="form-text text-muted">Use at least 8 characters.</small>
                    </div>

                    <div class="form-group">
                        <label for="confirm_password">Confirm New Password</label>
                        <div class="input-group password-field">
                            <input type="password" id="confirm_password" name="confirm_password" class="form-control" minlength="8" autocomplete="new-password" required>
                            <div class="input-group-append"><button type="button" class="btn btn-outline-secondary password-toggle" aria-label="Show password"><i class="far fa-eye"></i></button></div>
                        </div>
                        <small id="matchMessage" class="form-text"></small>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block mt-4">
                        <i class="fas fa-shield-alt mr-2"></i>Update Password
                    </button>
                </form>
                {% else %}
                <a href="/dashboard" class="btn btn-primary btn-block"><i class="fas fa-arrow-left mr-2"></i>Return to Dashboard</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>

<style>
.password-card{border-radius:18px}.password-icon{display:flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:15px;background:#e9efff;color:#4c55e8;font-size:1.35rem;margin-bottom:18px}.password-field .form-control{height:46px}.password-field .btn{min-width:46px}.password-card label{color:#26354d;font-weight:700}
</style>

<script>
document.querySelectorAll('.password-toggle').forEach(function(button){button.addEventListener('click',function(){const input=button.closest('.password-field').querySelector('input');const show=input.type==='password';input.type=show?'text':'password';button.querySelector('i').className=show?'far fa-eye-slash':'far fa-eye';});});
const newPassword=document.getElementById('new_password');const confirmPassword=document.getElementById('confirm_password');const matchMessage=document.getElementById('matchMessage');
function checkMatch(){if(!confirmPassword.value){matchMessage.textContent='';return;}const matches=newPassword.value===confirmPassword.value;matchMessage.textContent=matches?'Passwords match.':'Passwords do not match.';matchMessage.className='form-text '+(matches?'text-success':'text-danger');confirmPassword.setCustomValidity(matches?'':'Passwords do not match');}
newPassword.addEventListener('input',checkMatch);confirmPassword.addEventListener('input',checkMatch);
</script>
{% endblock %}
