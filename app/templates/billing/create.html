{% extends "layouts/base.html" %}

{% block content %}

<form id="invoiceForm" method="post" action="/billing/save">

    <div class="card card-primary">

        <div class="card-header">

            <div class="d-flex justify-content-between">

                <h3 class="card-title">

                    <i class="fas fa-file-invoice"></i>

                    GST Billing

                </h3>

                <a href="/billing/list" class="btn btn-secondary">

                    <i class="fas fa-list"></i>

                    Invoice List

                </a>

            </div>

        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-4">

                    <label>

                        Customer (Optional)

                    </label>

                    <select name="customer_id" class="form-control">

                        <option value="">

                            Guest / Walk-in Customer

                        </option>

                        {% for customer in customers %}

                        <option value="{{ customer.id }}">

                            {{ customer.customer_name }}

                        </option>

                        {% endfor %}

                    </select>

                    <div class="mt-2">

                        <label>

                            Walk-in Customer Name

                        </label>

                        <input type="text" name="manual_customer_name" class="form-control"
                            placeholder="Enter customer name">

                        <small class="text-muted">

                            Select existing customer OR enter walk-in customer name.
                            If both are blank, invoice will be saved as Guest.

                        </small>

                    </div>

                </div>

                <div class="col-md-3">

                    <label>

                        Payment Mode

                    </label>

                    <select class="form-control" name="payment_mode">

                        <option value="Cash">

                            Cash

                        </option>

                        <option value="UPI">

                            UPI

                        </option>

                        <option value="Card">

                            Card

                        </option>

                        <option value="Credit">

                            Credit

                        </option>

                    </select>

                </div>
                <div class="form-group">
                    <label>Payment Status</label>

                    <select name="payment_status" class="form-control">

                        <option value="Paid" selected>
                            Paid
                        </option>

                        <option value="Unpaid">
                            Unpaid
                        </option>

                    </select>
                </div>
                <div class="col-md-5">

                    <label>

                        Remarks

                    </label>

                    <input class="form-control" type="text" name="remarks">

                </div>

            </div>

            <hr>

            <div class="table-responsive billing-table-wrapper">

                <table class="table table-bordered table-hover" id="invoiceTable">

                    <thead>

                        <tr>

                            <th width="35%">

                                Product

                            </th>

                            <th width="10%">

                                Qty

                            </th>

                            <th width="15%">

                                Rate

                            </th>

                            <th width="10%">

                                GST %

                            </th>

                            <th width="15%">

                                Total

                            </th>

                            <th width="10%">

                                Action

                            </th>

                        </tr>

                    </thead>

                    <tbody id="invoiceBody">

                        <tr>

                            <td>

                                <select class="form-control product" name="product_id">

                                    {% for product in products %}

                                    <option value="{{ product.id }}" data-rate="{{ product.selling_price }}"
                                        data-gst="{{ product.gst_percentage }}">

                                        {{ product.product_name }}

                                    </option>

                                    {% endfor %}

                                </select>

                            </td>

                            <td>

                                <input class="form-control qty" type="number" step="0.01" value="1" name="qty">

                            </td>

                            <td>

                                <input class="form-control rate" type="number" step="0.01" name="rate">

                            </td>

                            <td>

                                <input class="form-control gst" type="number" step="0.01" name="gst">

                            </td>

                            <td>

                                <input class="form-control total" readonly name="total">

                            </td>

                            <td class="text-center">

                                <button type="button" class="btn btn-danger removeRow">

                                    <i class="fas fa-trash"></i>

                                </button>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

            <button id="addRow" type="button" class="btn btn-success">

                <i class="fas fa-plus"></i>

                Add Product

            </button>

            <hr>

            <div class="row">

                <div class="offset-md-8 col-md-4">

                    <table class="table table-bordered">

                        <tr>

                            <th>

                                Subtotal

                            </th>

                            <td>

                                <input class="form-control" id="subtotal" name="subtotal" readonly>

                            </td>

                        </tr>

                        <tr>

                            <th>

                                Discount

                            </th>

                            <td>

                                <input class="form-control" id="discount" name="discount" value="0">

                            </td>

                        </tr>

                        <tr>

                            <th>

                                Taxable

                            </th>

                            <td>

                                <input class="form-control" id="taxable" name="taxable_amount" readonly>

                            </td>

                        </tr>

                        <tr>

                            <th>

                                CGST

                            </th>

                            <td>

                                <input class="form-control" id="cgst" name="cgst" readonly>

                            </td>

                        </tr>

                        <tr>

                            <th>

                                SGST

                            </th>

                            <td>

                                <input class="form-control" id="sgst" name="sgst" readonly>

                            </td>

                        </tr>

                        <tr class="table-success">

                            <th>

                                Grand Total

                            </th>

                            <td>

                                <input class="form-control" id="grandTotal" name="grand_total" readonly>

                            </td>

                        </tr>

                    </table>

                </div>

            </div>

            <div class="text-center">

                <button type="submit" class="btn btn-primary">

                    Save Invoice

                </button>

                <button type="button" id="savePrint" class="btn btn-success">

                    Save & Print

                </button>

                <a href="/dashboard" class="btn btn-secondary">

                    Cancel

                </a>

            </div>

        </div>

    </div>

</form>
<script>

    function calculateRow(row) {

        let qty = parseFloat(

            row.querySelector(".qty").value || 0

        );

        let rate = parseFloat(

            row.querySelector(".rate").value || 0

        );

        let gst = parseFloat(

            row.querySelector(".gst").value || 0

        );

        let taxable = qty * rate;

        let gstAmount = taxable * gst / 100;

        let total = taxable + gstAmount;

        row.querySelector(".total").value = total.toFixed(2);

    }

    function calculateInvoice() {

        let subtotal = 0;

        document.querySelectorAll(

            "#invoiceBody tr"

        ).forEach(function (row) {

            calculateRow(row);

            let qty = parseFloat(

                row.querySelector(".qty").value || 0

            );

            let rate = parseFloat(

                row.querySelector(".rate").value || 0

            );

            subtotal += qty * rate;

        });

        let discount = parseFloat(

            document.getElementById("discount").value || 0

        );

        let taxable = subtotal - discount;

        if (taxable < 0) {

            taxable = 0;

        }

        let cgst = taxable * 0.09;

        let sgst = taxable * 0.09;

        let grand = taxable + cgst + sgst;

        document.getElementById(

            "subtotal"

        ).value = subtotal.toFixed(2);

        document.getElementById(

            "taxable"

        ).value = taxable.toFixed(2);

        document.getElementById(

            "cgst"

        ).value = cgst.toFixed(2);

        document.getElementById(

            "sgst"

        ).value = sgst.toFixed(2);

        document.getElementById(

            "grandTotal"

        ).value = grand.toFixed(2);

    }

    function productChanged(select) {

        let row = select.closest("tr");

        let option = select.options[

            select.selectedIndex

        ];

        let rate = parseFloat(

            option.getAttribute("data-rate") || 0

        );

        let gst = parseFloat(

            option.getAttribute("data-gst") || 0

        );

        row.querySelector(

            ".rate"

        ).value = rate.toFixed(2);

        row.querySelector(

            ".gst"

        ).value = gst.toFixed(2);

        calculateInvoice();

    }

    document.addEventListener(

        "change",

        function (e) {

            if (

                e.target.classList.contains(

                    "product"

                )

            ) {

                productChanged(

                    e.target

                );

            }

        }

    );

    document.addEventListener(

        "input",

        function (e) {

            if (

                e.target.classList.contains(

                    "qty"

                )

                ||

                e.target.classList.contains(

                    "rate"

                )

                ||

                e.target.classList.contains(

                    "gst"

                )

                ||

                e.target.id == "discount"

            ) {

                calculateInvoice();

            }

        }

    );

    document.getElementById(

        "addRow"

    ).addEventListener(

        "click",

        function () {

            let tbody = document.getElementById(

                "invoiceBody"

            );

            let firstRow = tbody.querySelector(

                "tr"

            );

            let clone = firstRow.cloneNode(

                true

            );

            clone.querySelector(

                ".qty"

            ).value = 1;

            clone.querySelector(

                ".rate"

            ).value = 0;

            clone.querySelector(

                ".gst"

            ).value = 18;

            clone.querySelector(

                ".total"

            ).value = "";

            tbody.appendChild(

                clone

            );

            productChanged(

                clone.querySelector(

                    ".product"

                )

            );

            calculateInvoice();

        }

    );

    document.addEventListener(

        "click",

        function (e) {

            let btn = e.target.closest(

                ".removeRow"

            );

            if (btn) {

                let rows = document.querySelectorAll(

                    "#invoiceBody tr"

                );

                if (rows.length > 1) {

                    btn.closest(

                        "tr"

                    ).remove();

                    calculateInvoice();

                }

            }

        }

    );

    document.getElementById(

        "invoiceForm"

    ).addEventListener(

        "submit",

        function (e) {

            let customer = document.querySelector(

                "select[name='customer_id']"

            ).value;

            // customer is optional now

            // if(customerId == ""){
            //     alert("Please select customer.");
            //     return false;
            // }

            let valid = true;

            document.querySelectorAll(

                "#invoiceBody tr"

            ).forEach(function (row) {

                let qty = parseFloat(

                    row.querySelector(

                        ".qty"

                    ).value || 0

                );

                let rate = parseFloat(

                    row.querySelector(

                        ".rate"

                    ).value || 0

                );

                if (

                    qty <= 0 ||

                    rate <= 0

                ) {

                    valid = false;

                }

            });

            if (!valid) {

                alert(

                    "Please enter valid Qty and Rate."

                );

                e.preventDefault();

                return;

            }

        }

    );

    document.getElementById(

        "savePrint"

    ).addEventListener(

        "click",

        function () {

            document.getElementById(

                "invoiceForm"

            ).submit();

        }

    );

    window.onload = function () {

        document.querySelectorAll(

            ".product"

        ).forEach(function (select) {

            productChanged(

                select

            );

        });

        calculateInvoice();

    };

</script>
<style>
    @media (max-width: 768px) {

        .billing-table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        #invoiceTable {
            min-width: 720px;
            font-size: 13px;
        }

        #invoiceTable th,
        #invoiceTable td {
            white-space: nowrap;
            vertical-align: middle;
            padding: 6px;
        }

        #invoiceTable select,
        #invoiceTable input {
            min-width: 70px;
            font-size: 13px;
            padding: 4px;
        }

        #invoiceTable .product {
            min-width: 180px;
        }

        #invoiceTable .btn {
            padding: 4px 8px;
        }

        #addRow {
            width: 100%;
            margin-top: 10px;
        }

    }
</style>
{% endblock %}
