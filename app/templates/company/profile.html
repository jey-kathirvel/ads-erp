{% extends "layouts/base.html" %}

{% block content %}

<div class="card card-primary">

    <div class="card-header">

        <h3 class="card-title">

            Company Settings

        </h3>

    </div>

    <form
        method="post"
        action="/settings/company">

        <div class="card-body">

            <div class="row">

                <div class="col-md-6">

                    <label>

                        Company Name

                    </label>

                    <input
                        class="form-control"
                        name="company_name"
                        value="{{ company.company_name if company else '' }}">

                </div>

                <div class="col-md-6">

                    <label>

                        GSTIN

                    </label>

                    <input
                        class="form-control"
                        name="gstin"
                        value="{{ company.gstin if company else '' }}">

                </div>

            </div>

            <div class="form-group mt-3">

                <label>

                    Address

                </label>

                <textarea
                    class="form-control"
                    name="address">{{ company.address if company else '' }}</textarea>

            </div>

            <div class="row">

                <div class="col-md-4">

                    <label>

                        City

                    </label>

                    <input
                        class="form-control"
                        name="city"
                        value="{{ company.city if company else '' }}">

                </div>

                <div class="col-md-4">

                    <label>

                        State

                    </label>

                    <input
                        class="form-control"
                        name="state"
                        value="{{ company.state if company else '' }}">

                </div>

                <div class="col-md-4">

                    <label>

                        Pincode

                    </label>

                    <input
                        class="form-control"
                        name="pincode"
                        value="{{ company.pincode if company else '' }}">

                </div>

            </div>

            <div class="row mt-3">

                <div class="col-md-4">

                    <label>

                        Mobile

                    </label>

                    <input
                        class="form-control"
                        name="mobile"
                        value="{{ company.mobile if company else '' }}">

                </div>

                <div class="col-md-4">

                    <label>

                        Email

                    </label>

                    <input
                        class="form-control"
                        name="email"
                        value="{{ company.email if company else '' }}">

                </div>

                <div class="col-md-4">

                    <label>

                        Website

                    </label>

                    <input
                        class="form-control"
                        name="website"
                        value="{{ company.website if company else '' }}">

                </div>

            </div>

            <hr>

            <div class="row">

                <div class="col-md-4">

                    <label>

                        Invoice Prefix

                    </label>

                    <input
                        class="form-control"
                        name="invoice_prefix"
                        value="{{ company.invoice_prefix if company else 'INV' }}">

                </div>

                <div class="col-md-4">

                    <label>

                        Purchase Prefix

                    </label>

                    <input
                        class="form-control"
                        name="purchase_prefix"
                        value="{{ company.purchase_prefix if company else 'PUR' }}">

                </div>

                <div class="col-md-4">

                    <label>

                        Currency

                    </label>

                    <input
                        class="form-control"
                        name="currency"
                        value="{{ company.currency if company else 'INR' }}">

                </div>

            </div>

        </div>

        <div class="card-footer">

            <button
                class="btn btn-primary">

                Save Company Settings

            </button>

        </div>

    </form>

</div>

{% endblock %}
