{% extends "layouts/base.html" %}{% block content %}<link rel="stylesheet" href="/static/css/ads-finance-tools.css?v=1"><div class="finance-page">{% include "finance/_nav.html" %}<h1>Expense Categories</h1><div class="row"><div class="col-lg-4"><form action="/finance-tools/categories/save" method="post" class="card"><div class="card-body"><div class="form-group"><label>Name</label><input name="name" required class="form-control"></div><div class="form-group"><label>Description</label><input name="description" class="form-control"></div><div class="form-row"><div class="col form-group"><label>Colour</label><input type="color" name="color" value="#2563eb" class="form-control"></div><div class="col form-group"><label>Order</label><input type="number" name="display_order" value="1" class="form-control"></div></div><input type="hidden" name="icon" value="fas fa-receipt"><button class="btn btn-primary">Save Category</button></div></form></div><div class="col-lg-8"><div class="card"><div class="card-body p-0"><table class="table mb-0"><thead><tr><th>Category</th><th>Description</th><th>Order</th><th>Action</th></tr></thead><tbody>{% for r in rows %}<tr><td><span class="category-dot" style="background:{{ r.color }}"></span>{{ r.name }}</td><td>{{ r.description or '-' }}</td><td>{{ r.display_order }}</td><td><form method="post" action="/finance-tools/categories/{{ r.id }}/delete" onsubmit="return confirm('Delete?')"><button class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button></form></td></tr>{% else %}<tr><td colspan="4" class="text-center">No categories.</td></tr>{% endfor %}</tbody></table></div></div></div></div></div>{% endblock %}
