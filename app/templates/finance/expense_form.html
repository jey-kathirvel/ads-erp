{% extends "layouts/base.html" %}{% block content %}<link rel="stylesheet" href="/static/css/ads-finance-tools.css?v=1"><div class="finance-page">{% include "finance/_nav.html" %}<h1>{{ 'Edit' if row else 'Add' }} Expense</h1><form action="/finance-tools/expenses/save" method="post" enctype="multipart/form-data" class="card"><div class="card-body">{% if row %}<input type="hidden" name="item_id" value="{{ row.id }}">{% endif %}<div class="row"><div class="col-md-3 form-group"><label>Date</label><input type="date" name="expense_date" required class="form-control" value="{{ row.expense_date if row else '' }}"></div><div class="col-md-3 form-group"><label>Category</label><select name="category_id" required class="form-control">{% for x in categories %}<option value="{{ x.id }}" {% if row and row.category_id==x.id %}selected{% endif %}>{{ x.name }}</option>{% endfor %}</select></div><div class="col-md-3 form-group"><label>Vendor</label><select name="vendor_id" class="form-control"><option value="">None</option>{% for x in vendors %}<option value="{{ x.id }}" {% if row and row.vendor_id==x.id %}selected{% endif %}>{{ x.name }}</option>{% endfor %}</select></div><div class="col-md-3 form-group"><label>Base Amount</label><input id="expense_amount" type="number" step=".01" min="0" name="amount" required class="form-control" value="{{ row.amount if row else '' }}"></div><div class="col-md-3 form-group"><label>GST %</label><input id="expense_gst" type="number" step=".01" min="0" name="gst_percentage" class="form-control" value="{{ row.gst_percentage if row else 0 }}"></div><div class="col-md-3 form-group"><label>Total Preview</label><input id="expense_total" readonly class="form-control"></div><div class="col-md-3 form-group"><label>Payment Mode</label><select name="payment_mode" class="form-control">{% for x in modes %}<option {% if row and row.payment_mode==x %}selected{% endif %}>{{ x }}</option>{% endfor %}</select></div><div class="col-md-3 form-group"><label>Status</label><select name="status" class="form-control">{% for x in ['Paid','Pending','Partially Paid'] %}<option {% if row and row.status==x %}selected{% endif %}>{{ x }}</option>{% endfor %}</select></div><div class="col-md-4 form-group"><label>Bill Number</label><input name="bill_number" class="form-control" value="{{ row.bill_number if row and row.bill_number else '' }}"></div><div class="col-md-8 form-group"><label>Description</label><input name="description" class="form-control" value="{{ row.description if row and row.description else '' }}"></div><div class="col-12 form-group"><label>Attachment</label><input type="file" name="attachment" class="form-control" accept="image/*,.pdf"></div></div></div><div class="card-footer"><button class="btn btn-danger">Save Expense</button> <a href="/finance-tools/expenses" class="btn btn-secondary">Cancel</a></div></form></div><script>function total(){let a=+document.getElementById('expense_amount').value||0,g=+document.getElementById('expense_gst').value||0;document.getElementById('expense_total').value='₹'+(a+a*g/100).toFixed(2)}document.addEventListener('input',total);total();</script>{% endblock %}
