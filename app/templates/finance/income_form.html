{% extends "layouts/base.html" %}{% block content %}<link rel="stylesheet" href="/static/css/ads-finance-tools.css?v=1"><div class="finance-page">{% include "finance/_nav.html" %}<h1>{{ 'Edit' if row else 'Add' }} Income</h1><form action="/finance-tools/income/save" method="post" enctype="multipart/form-data" class="card"><div class="card-body">{% if row %}<input type="hidden" name="item_id" value="{{ row.id }}">{% endif %}<div class="row"><div class="col-md-4 form-group"><label>Date</label><input type="date" name="income_date" class="form-control" required value="{{ row.income_date if row else '' }}"></div><div class="col-md-4 form-group"><label>Category</label><select name="category" class="form-control">{% for x in categories %}<option {% if row and row.category==x %}selected{% endif %}>{{ x }}</option>{% endfor %}</select></div><div class="col-md-4 form-group"><label>Amount</label><input type="number" step=".01" min="0" name="amount" class="form-control" required value="{{ row.amount if row else '' }}"></div><div class="col-md-4 form-group"><label>Received From</label><input name="received_from" class="form-control" required value="{{ row.received_from if row else '' }}"></div><div class="col-md-4 form-group"><label>Payment Mode</label><select name="payment_mode" class="form-control">{% for x in modes %}<option {% if row and row.payment_mode==x %}selected{% endif %}>{{ x }}</option>{% endfor %}</select></div><div class="col-md-4 form-group"><label>Reference No</label><input name="reference_no" class="form-control" value="{{ row.reference_no if row and row.reference_no else '' }}"></div><div class="col-12 form-group"><label>Description</label><textarea name="description" class="form-control">{{ row.description if row and row.description else '' }}</textarea></div><div class="col-12 form-group"><label>Attachment</label><input type="file" name="attachment" class="form-control" accept="image/*,.pdf"></div></div></div><div class="card-footer"><button class="btn btn-success">Save Income</button> <a href="/finance-tools/income" class="btn btn-secondary">Cancel</a></div></form></div>{% endblock %}
