{% extends "layouts/base.html" %}
{% block content %}
<link rel="stylesheet" href="/static/css/ads-hrm.css?v=1">
<div class="hrm-page"><div class="mb-4"><h1 class="h3 hrm-heading mb-1">{{ 'Edit Employee' if employee else 'Add Employee' }}</h1><p class="hrm-subtitle mb-0">Core employment and contact information</p></div>
<form method="post" action="/hrm/employees/save"><input type="hidden" name="employee_id" value="{{ employee.id if employee else '' }}">
<div class="card"><div class="card-header"><h3 class="card-title"><i class="fas fa-id-card mr-2 text-primary"></i>Employee Profile</h3></div><div class="card-body">
<div class="form-section"><div class="row"><div class="col-md-6 form-group"><label>Full Name *</label><input class="form-control" name="full_name" required value="{{ employee.full_name if employee else '' }}"></div><div class="col-md-3 form-group"><label>Email</label><input class="form-control" type="email" name="email" value="{{ employee.email or '' if employee else '' }}"></div><div class="col-md-3 form-group"><label>Phone</label><input class="form-control" name="phone" value="{{ employee.phone or '' if employee else '' }}"></div></div></div>
<div class="form-section"><div class="row"><div class="col-md-3 form-group"><label>Department *</label><input class="form-control" name="department" required value="{{ employee.department if employee else 'General' }}"></div><div class="col-md-3 form-group"><label>Designation *</label><input class="form-control" name="designation" required value="{{ employee.designation if employee else 'Staff' }}"></div><div class="col-md-3 form-group"><label>Employment Type</label><select class="form-control" name="employment_type">{% for value,label in [('FULL_TIME','Full Time'),('PART_TIME','Part Time'),('CONTRACT','Contract'),('INTERN','Intern')] %}<option value="{{ value }}" {% if employee and employee.employment_type == value %}selected{% endif %}>{{ label }}</option>{% endfor %}</select></div><div class="col-md-3 form-group"><label>Joining Date *</label><input class="form-control" type="date" name="join_date" required value="{{ employee.join_date.isoformat() if employee else '' }}"></div><div class="col-md-3 form-group"><label>Basic Salary</label><input class="form-control" type="number" step="0.01" min="0" name="basic_salary" value="{{ employee.basic_salary if employee else 0 }}"></div><div class="col-md-4 form-group"><label>Emergency Contact</label><input class="form-control" name="emergency_contact" value="{{ employee.emergency_contact or '' if employee else '' }}"></div><div class="col-md-5 form-group"><label>Address</label><textarea class="form-control" name="address" rows="2">{{ employee.address or '' if employee else '' }}</textarea></div></div></div>
<div class="custom-control custom-switch mb-3"><input type="checkbox" class="custom-control-input" id="active" name="is_active" value="true" {% if not employee or employee.is_active %}checked{% endif %}><label class="custom-control-label" for="active">Active employee</label></div>
<button class="btn btn-primary"><i class="fas fa-save mr-1"></i>Save Employee</button><a href="/hrm/employees" class="btn btn-secondary ml-2">Cancel</a>
</div></div></form></div>
{% endblock %}
