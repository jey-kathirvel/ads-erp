<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>

        ADS ERP

    </title>

    <!-- Favicon -->

    <link rel="icon" type="image/png" href="/static/uploads/logo/logo.png">

    <!-- FontAwesome -->

    <link rel="stylesheet" href="/static/adminlte/plugins/fontawesome-free/css/all.min.css">

    <!-- OverlayScrollbars -->

    <link rel="stylesheet" href="/static/adminlte/plugins/overlayScrollbars/css/OverlayScrollbars.min.css">

    <!-- AdminLTE -->

    <link rel="stylesheet" href="/static/adminlte/dist/css/adminlte.min.css">
    <!-- STEP 68C2: legacy rich-blue theme disabled; authoritative shell is ads-modern-saas.css -->
    <link rel="stylesheet" href="/static/css/ads-modern-saas.css?v=68c1">
    <link rel="stylesheet" href="/static/css/ads-global-v2.css?v=4b3">

    <!-- ADS ERP UI V2 -->
    <link rel="stylesheet" href="/static/css/ads-theme.css?v=1">
    <link rel="stylesheet" href="/static/css/ads-shell.css?v=1">
    <link rel="stylesheet" href="/static/css/ads-components.css?v=1">
    <link rel="stylesheet" href="/static/css/ads-forms.css?v=1">
    <link rel="stylesheet" href="/static/css/ads-buttons.css?v=1">
    <link rel="stylesheet" href="/static/css/ads-tables.css?v=1">
    <link rel="stylesheet" href="/static/css/ads-responsive.css?v=1">

    <!-- ADS Elite Light: the single application theme -->
    <link rel="stylesheet" href="/static/css/ads-elite-light.css?v=1">

    <style>
        @media (max-width:768px) {

            .btn-sm {

                margin-bottom: 4px;

            }

            td.text-center .btn {

                display: block;

                width: 100%;

                margin-bottom: 4px;

            }

        }

        .brand-logo {

            max-height: 70px;

            max-width: 220px;

            width: auto;

            display: block;

            margin: auto;

        }

        .content-wrapper {

            min-height: calc(100vh - 115px);

        }

        .loader-wrapper {

            position: fixed;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            background: #ffffff;

            display: flex;

            align-items: center;

            justify-content: center;

            z-index: 9999;

        }

        .loader-wrapper.hidden {

            display: none;

        }

        /* ------------------------------
   Mobile Responsive
--------------------------------*/

        @media (max-width: 768px) {

            .content-wrapper {

                margin-left: 0 !important;

            }

            .main-sidebar {

                width: 260px !important;

            }

            .brand-logo {

                max-height: 55px;

                max-width: 180px;

            }

            .card {

                margin-bottom: 12px;

            }

            .table-responsive {

                overflow-x: auto;

            }

            .btn {

                margin-bottom: 5px;

            }

        }

        /* Invoice / Forms */

        @media (max-width: 576px) {

            .row>div {

                margin-bottom: 10px;

            }

            h1,
            h2,
            h3,
            h4,
            h5 {

                font-size: 90%;

            }

            .card-body {

                padding: 12px;

            }

        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
</head>

<body class="hold-transition sidebar-mini layout-fixed layout-navbar-fixed ads-elite-light">

    <div class="loader-wrapper" id="loader">

        <div class="text-center">

            <img src="/static/uploads/logo/logo.png" class="brand-logo" alt="ADS ERP">

            <br><br>

            <div class="spinner-border text-primary"></div>

        </div>

    </div>

    <div class="wrapper">

        <!-- Navbar -->

        {% include 'layouts/navbar.html' %}

        <!-- Sidebar -->

        {% include 'layouts/sidebar.html' %}

        <!-- Content -->

        <div class="content-wrapper">

            <section class="content pt-3">

                <div class="container-fluid">

                    {% block content %}

                    {% endblock %}

                </div>

            </section>

        </div>

        <!-- Footer -->

        {% include 'layouts/footer.html' %}

    </div>

    <!-- jQuery -->

    <script src="/static/adminlte/plugins/jquery/jquery.min.js"></script>

    <!-- Bootstrap -->

    <script src="/static/adminlte/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- OverlayScrollbars -->

    <script src="/static/adminlte/plugins/overlayScrollbars/js/jquery.overlayScrollbars.min.js"></script>

    <!-- AdminLTE -->

    <script src="/static/adminlte/dist/js/adminlte.min.js"></script>

    <script>

        window.addEventListener(

            "load",

            function () {

                document

                    .getElementById(

                        "loader"

                    )

                    .classList

                    .add(

                        "hidden"

                    );

            }

        );

    </script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</body>

</html>
