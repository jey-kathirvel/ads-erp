<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">

    <title>

        ADS ERP

    </title>

    <!-- Favicon -->

    <link
        rel="icon"
        type="image/png"
        href="/static/uploads/logo/logo.png">

    <!-- FontAwesome -->

    <link
        rel="stylesheet"
        href="/static/adminlte/plugins/fontawesome-free/css/all.min.css">

    <!-- OverlayScrollbars -->

    <link
        rel="stylesheet"
        href="/static/adminlte/plugins/overlayScrollbars/css/OverlayScrollbars.min.css">

    <!-- AdminLTE -->

    <link
        rel="stylesheet"
        href="/static/adminlte/dist/css/adminlte.min.css">

    <style>

.brand-logo{

    max-height:70px;

    max-width:220px;

    width:auto;

    display:block;

    margin:auto;

}
        .content-wrapper{

            min-height:calc(100vh - 115px);

        }

        .loader-wrapper{

            position:fixed;

            top:0;

            left:0;

            width:100%;

            height:100%;

            background:#ffffff;

            display:flex;

            align-items:center;

            justify-content:center;

            z-index:9999;

        }

        .loader-wrapper.hidden{

            display:none;

        }

    </style>

</head>

<body class="hold-transition sidebar-mini layout-fixed">

<div class="loader-wrapper" id="loader">

    <div class="text-center">

        <img

            src="/static/uploads/logo/logo.png"

            class="brand-logo"

            alt="ADS ERP">

        <br><br>

        <div class="spinner-border text-primary"></div>

    </div>

</div>

<div class="wrapper">

    <!-- Navbar -->

    {% include 'layouts/navbar.html' %}

    <!-- Sidebar -->

    {% include 'layouts/sidebar.html' %}

    <!-- Content -->

    <div class="content-wrapper">

        <section class="content pt-3">

            <div class="container-fluid">

                {% block content %}

                {% endblock %}

            </div>

        </section>

    </div>

    <!-- Footer -->

    {% include 'layouts/footer.html' %}

</div>

<!-- jQuery -->

<script src="/static/adminlte/plugins/jquery/jquery.min.js"></script>

<!-- Bootstrap -->

<script src="/static/adminlte/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>

<!-- OverlayScrollbars -->

<script src="/static/adminlte/plugins/overlayScrollbars/js/jquery.overlayScrollbars.min.js"></script>

<!-- AdminLTE -->

<script src="/static/adminlte/dist/js/adminlte.min.js"></script>

<script>

window.addEventListener(

    "load",

    function(){

        document

            .getElementById(

                "loader"

            )

            .classList

            .add(

                "hidden"

            );

    }

);

</script>

</body>

</html>
