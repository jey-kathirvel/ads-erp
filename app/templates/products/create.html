{% extends "layouts/base.html" %}

{% block content %}

<h2>Add Product</h2>

<hr>

<form method="post">

<div class="row">

<div class="col-md-6">

<label>Product Name</label>

<input
class="form-control"
name="product_name"
required>

</div>

<div class="col-md-6">

<label>HSN Code</label>

<input
class="form-control"
name="hsn_code">

</div>

</div>

<div class="row mt-3">

<div class="col-md-3">

<label>GST %</label>

<input
class="form-control"
name="gst_percentage"
value="18">

</div>

<div class="col-md-3">

<label>Purchase Price</label>

<input
class="form-control"
name="purchase_price"
value="0">

</div>

<div class="col-md-3">

<label>Selling Price</label>

<input
class="form-control"
name="selling_price"
value="0">

</div>

<div class="col-md-3">

<label>Opening Stock</label>

<input
class="form-control"
name="opening_stock"
value="0">

</div>

</div>

<div class="row mt-3">

<div class="col-md-6">

<label>Barcode</label>

<input
class="form-control"
name="barcode">

</div>

<div class="col-md-6">

<label>Minimum Stock</label>

<input
class="form-control"
name="minimum_stock"
value="0">

</div>

</div>

<div class="row mt-3">

<div class="col-md-12">

<label>Description</label>

<textarea
class="form-control"
name="description"></textarea>

</div>

</div>

<div class="mt-4">

<button class="btn btn-success">

<i class="fas fa-save"></i>

Save Product

</button>

<a
href="/products"
class="btn btn-secondary">

Cancel

</a>

</div>

</form>

{% endblock %}
