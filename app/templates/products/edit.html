{% extends "layouts/base.html" %}

{% block content %}

<div class="card">

    <div class="card-header">

        <div class="d-flex justify-content-between align-items-center">

            <h3 class="card-title">

                <i class="fas fa-edit"></i>

                Edit Product

            </h3>

            <a
                href="/products"
                class="btn btn-secondary">

                <i class="fas fa-arrow-left"></i>

                Back

            </a>

        </div>

    </div>

    <form method="post">

        <div class="card-body">

            <div class="row">

                <div class="col-md-6">

                    <label>

                        Product Name

                    </label>

                    <input
                        class="form-control"
                        name="product_name"
                        value="{{ product.product_name }}"
                        required>

                </div>

                <div class="col-md-3">

                    <label>

                        HSN Code

                    </label>

                    <input
                        class="form-control"
                        name="hsn_code"
                        value="{{ product.hsn_code or '' }}">

                </div>

                <div class="col-md-3">

                    <label>

                        GST %

                    </label>

                    <input
                        class="form-control"
                        type="number"
                        step="0.01"
                        name="gst_percentage"
                        value="{{ product.gst_percentage }}">

                </div>

            </div>

            <div class="row mt-3">

                <div class="col-md-3">

                    <label>

                        Purchase Price

                    </label>

                    <input
                        class="form-control"
                        type="number"
                        step="0.01"
                        name="purchase_price"
                        value="{{ product.purchase_price }}">

                </div>

                <div class="col-md-3">

                    <label>

                        Selling Price

                    </label>

                    <input
                        class="form-control"
                        type="number"
                        step="0.01"
                        name="selling_price"
                        value="{{ product.selling_price }}">

                </div>

                <div class="col-md-3">

                    <label>

                        Opening Stock

                    </label>

                    <input
                        class="form-control"
                        type="number"
                        step="0.01"
                        name="opening_stock"
                        value="{{ product.opening_stock }}">

                </div>

                <div class="col-md-3">

                    <label>

                        Minimum Stock

                    </label>

                    <input
                        class="form-control"
                        type="number"
                        step="0.01"
                        name="minimum_stock"
                        value="{{ product.minimum_stock }}">

                </div>

            </div>

            <div class="row mt-3">

                <div class="col-md-6">

                    <label>

                        Barcode

                    </label>

                    <input
                        class="form-control"
                        name="barcode"
                        value="{{ product.barcode or '' }}">

                </div>

            </div>

            <div class="row mt-3">

                <div class="col-md-12">

                    <label>

                        Description

                    </label>

                    <textarea
                        class="form-control"
                        rows="4"
                        name="description">{{ product.description or '' }}</textarea>

                </div>

            </div>

        </div>

        <div class="card-footer">

            <button
                class="btn btn-primary">

                <i class="fas fa-save"></i>

                Update Product

            </button>

            <a
                href="/products"
                class="btn btn-secondary">

                Cancel

            </a>

        </div>

    </form>

</div>

{% endblock %}
