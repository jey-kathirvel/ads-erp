{% extends "layouts/base.html" %}

{% block content %}

<form method="post" action="/purchase/save">

<div class="card">

    <div class="card-header bg-success">

        <h3 class="card-title">

            <i class="fas fa-shopping-cart"></i>

            Purchase Entry

        </h3>

    </div>

    <div class="card-body">

        <div class="row">

            <div class="col-md-6">

                <label>Supplier</label>

                <select class="form-control" name="supplier_id" required>

                    {% for supplier in suppliers %}

                    <option value="{{ supplier.id }}">

                        {{ supplier.supplier_name }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="col-md-3">

                <label>Purchase Date</label>

                <input type="date"

                       class="form-control"

                       value="{{ today }}">

            </div>

            <div class="col-md-3">

                <label>Payment</label>

                <select class="form-control"

                        name="payment_mode">

                    <option>Cash</option>
                    <option>UPI</option>
                    <option>Bank</option>
                    <option>Credit</option>

                </select>

            </div>

        </div>

        <hr>

        <table class="table table-bordered"

               id="purchaseTable">

            <thead>

            <tr>

                <th width="35%">Product</th>

                <th width="10%">Qty</th>

                <th width="15%">Rate</th>

                <th width="10%">GST</th>

                <th width="15%">Total</th>

                <th width="10%"></th>

            </tr>

            </thead>

            <tbody id="purchaseBody">

            <tr>

                <td>

                    <select

                        class="form-control product"

                        name="product_id[]">

                        {% for product in products %}

                        <option

                            value="{{ product.id }}"

                            data-rate="{{ product.purchase_price }}"

                            data-gst="{{ product.gst_percentage }}">

                            {{ product.product_name }}

                        </option>

                        {% endfor %}

                    </select>

                </td>

                <td>

                    <input

                        class="form-control qty"

                        name="qty[]"

                        value="1"

                        type="number">

                </td>

                <td>

                    <input

                        class="form-control rate"

                        name="rate[]"

                        value="0"

                        step="0.01">

                </td>

                <td>

                    <input

                        class="form-control gst"

                        name="gst[]"

                        value="18">

                </td>

                <td>

                    <input

                        class="form-control total"

                        name="total[]"

                        readonly

                        value="0">

                </td>

                <td>

                    <button

                        type="button"

                        class="btn btn-danger removeRow">

                        <i class="fas fa-trash"></i>

                    </button>

                </td>

            </tr>

            </tbody>

        </table>

        <button

            type="button"

            id="addRow"

            class="btn btn-success">

            <i class="fas fa-plus"></i>

            Add Product

        </button>

        <hr>

        <div class="row">

            <div class="col-md-8"></div>

            <div class="col-md-4">

                <table class="table table-bordered">

                    <tr>

                        <th>Subtotal</th>

                        <td id="subtotal">

                            ₹0.00

                        </td>

                    </tr>

                    <tr>

                        <th>GST</th>

                        <td id="gsttotal">

                            ₹0.00

                        </td>

                    </tr>

                    <tr>

                        <th>Grand Total</th>

                        <td>

                            <strong id="grandtotal">

                                ₹0.00

                            </strong>

                        </td>

                    </tr>

                </table>

            </div>

        </div>

        <input type="hidden" name="subtotal" id="subtotal_input">
        <input type="hidden" name="discount" value="0">
        <input type="hidden" name="taxable_amount" id="taxable_input">
        <input type="hidden" name="cgst" id="cgst_input">
        <input type="hidden" name="sgst" id="sgst_input">
        <input type="hidden" name="igst" value="0">
        <input type="hidden" name="grand_total" id="grandtotal_input">
        <input type="hidden" name="remarks" value="">

        <button

            class="btn btn-primary mt-3">

            <i class="fas fa-save"></i>

            Save Purchase

        </button>

    </div>

</div>

</form>

<script>

function calculate(){

let subtotal=0;

let gsttotal=0;

document.querySelectorAll("#purchaseBody tr").forEach(function(row){

let qty=parseFloat(row.querySelector(".qty").value)||0;

let rate=parseFloat(row.querySelector(".rate").value)||0;

let gst=parseFloat(row.querySelector(".gst").value)||0;

let total=qty*rate;

row.querySelector(".total").value=total.toFixed(2);

subtotal+=total;

gsttotal+=total*gst/100;

});

document.getElementById("subtotal").innerHTML="₹"+subtotal.toFixed(2);

document.getElementById("gsttotal").innerHTML="₹"+gsttotal.toFixed(2);

document.getElementById("grandtotal").innerHTML="₹"+(subtotal+gsttotal).toFixed(2);

document.getElementById("subtotal_input").value=subtotal.toFixed(2);

document.getElementById("taxable_input").value=subtotal.toFixed(2);

document.getElementById("cgst_input").value=(gsttotal/2).toFixed(2);

document.getElementById("sgst_input").value=(gsttotal/2).toFixed(2);

document.getElementById("grandtotal_input").value=(subtotal+gsttotal).toFixed(2);

}

document.addEventListener("input",calculate);

document.getElementById("purchaseBody").addEventListener("change",function(e){

if(e.target.classList.contains("product")){

let option=e.target.options[e.target.selectedIndex];

e.target.closest("tr").querySelector(".rate").value=option.dataset.rate;

e.target.closest("tr").querySelector(".gst").value=option.dataset.gst;

calculate();

}

});

document.getElementById("addRow").onclick=function(){

let row=document.querySelector("#purchaseBody tr").cloneNode(true);

document.getElementById("purchaseBody").appendChild(row);

calculate();

};

document.getElementById("purchaseBody").addEventListener("click",function(e){

if(e.target.closest(".removeRow")){

if(document.querySelectorAll("#purchaseBody tr").length>1){

e.target.closest("tr").remove();

calculate();

}

}

});

calculate();

</script>

{% endblock %}
