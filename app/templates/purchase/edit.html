{% extends "layouts/base.html" %}

{% block content %}

<div class="card card-primary">

    <div class="card-header">

        <h3 class="card-title">
            <i class="fas fa-edit"></i>
            Edit Purchase - {{ purchase.purchase_no }}
        </h3>

    </div>

    <form method="post" action="/purchase/update/{{ purchase.id }}">

        <div class="card-body">

            <div class="row">

                <div class="col-md-6">

                    <label><strong>Supplier</strong></label>

                    <select name="supplier_id" class="form-control" required>

                        {% for supplier in suppliers %}
                        <option value="{{ supplier.id }}"
                            {% if supplier.id == purchase.supplier_id %}selected{% endif %}>
                            {{ supplier.supplier_name }}
                        </option>
                        {% endfor %}

                    </select>

                </div>

                <div class="col-md-6">

                    <label><strong>Payment Mode</strong></label>

                    <input
                        type="text"
                        name="payment_mode"
                        class="form-control"
                        value="{{ purchase.payment_mode }}">

                </div>

            </div>

            <hr>

            <h5>
                <i class="fas fa-shopping-cart"></i>
                Purchase Items
            </h5>

            {% for item in items %}

            <div class="card card-outline card-secondary mb-3">

                <div class="card-body">

                    <div class="form-group">

                        <label>Product</label>

                        <select name="product_id" class="form-control">

                            {% for product in products %}
                            <option value="{{ product.id }}"
                                {% if product.id == item.product_id %}selected{% endif %}>
                                {{ product.product_name }}
                            </option>
                            {% endfor %}

                        </select>

                    </div>

                    <div class="row">

                        <div class="col-6">

                            <label>Qty</label>

                            <input
                                type="number"
                                step="0.01"
                                name="qty"
                                class="form-control qty"
                                value="{{ item.qty }}"
                                oninput="calculateTotals()">

                        </div>

                        <div class="col-6">

                            <label>Rate</label>

                            <input
                                type="number"
                                step="0.01"
                                name="rate"
                                class="form-control rate"
                                value="{{ item.rate }}"
                                oninput="calculateTotals()">

                        </div>

                    </div>

                    <div class="row mt-2">

                        <div class="col-6">

                            <label>GST %</label>

                            <input
                                type="number"
                                step="0.01"
                                name="gst"
                                class="form-control gst"
                                value="{{ item.gst_percentage }}"
                                oninput="calculateTotals()">

                        </div>

                        <div class="col-6">

                            <label>Line Total</label>

                            <input
                                type="number"
                                step="0.01"
                                name="total"
                                class="form-control total"
                                value="{{ item.total }}"
                                readonly>

                        </div>

                    </div>

                </div>

            </div>

            {% endfor %}

            <input type="hidden" name="subtotal" id="subtotal_input">
            <input type="hidden" name="discount" value="0">
            <input type="hidden" name="taxable_amount" id="taxable_input">
            <input type="hidden" name="cgst" id="cgst_input">
            <input type="hidden" name="sgst" id="sgst_input">
            <input type="hidden" name="igst" value="0">
            <input type="hidden" name="grand_total" id="grandtotal_input">

            <div class="row">

                <div class="col-12 col-md-4 mb-2">

                    <div class="small-box bg-info">

                        <div class="inner">

                            <h4 id="subtotal_box">₹ 0.00</h4>

                            <p>Subtotal</p>

                        </div>

                    </div>

                </div>

                <div class="col-12 col-md-4 mb-2">

                    <div class="small-box bg-warning">

                        <div class="inner">

                            <h4 id="gst_box">₹ 0.00</h4>

                            <p>Total GST</p>

                        </div>

                    </div>

                </div>

                <div class="col-12 col-md-4 mb-2">

                    <div class="small-box bg-success">

                        <div class="inner">

                            <h4 id="grandtotal_box">₹ 0.00</h4>

                            <p>Grand Total</p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <div class="card-footer">

            <button type="submit" class="btn btn-success mb-1">
                <i class="fas fa-save"></i>
                Update Purchase
            </button>

            <a href="/purchase/view/{{ purchase.id }}"
               class="btn btn-info mb-1">
                <i class="fas fa-eye"></i>
                View
            </a>

            <a href="/purchase/list"
               class="btn btn-secondary mb-1">
                Cancel
            </a>

        </div>

    </form>

</div>

<script>

function calculateTotals() {

    let subtotal = 0;
    let totalGST = 0;

    document.querySelectorAll(".card-outline").forEach(card => {

        const qty =
            parseFloat(card.querySelector(".qty").value) || 0;

        const rate =
            parseFloat(card.querySelector(".rate").value) || 0;

        const gst =
            parseFloat(card.querySelector(".gst").value) || 0;

        const lineAmount = qty * rate;

        const gstAmount = lineAmount * gst / 100;

        const lineTotal = lineAmount + gstAmount;

        card.querySelector(".total").value =
            lineTotal.toFixed(2);

        subtotal += lineAmount;
        totalGST += gstAmount;
    });

    const grandTotal = subtotal + totalGST;

    document.getElementById("subtotal_box").innerHTML =
        "₹ " + subtotal.toFixed(2);

    document.getElementById("gst_box").innerHTML =
        "₹ " + totalGST.toFixed(2);

    document.getElementById("grandtotal_box").innerHTML =
        "₹ " + grandTotal.toFixed(2);

    document.getElementById("subtotal_input").value =
        subtotal.toFixed(2);

    document.getElementById("taxable_input").value =
        subtotal.toFixed(2);

    document.getElementById("cgst_input").value =
        (totalGST / 2).toFixed(2);

    document.getElementById("sgst_input").value =
        (totalGST / 2).toFixed(2);

    document.getElementById("grandtotal_input").value =
        grandTotal.toFixed(2);
}

document.addEventListener(
    "DOMContentLoaded",
    calculateTotals
);

</script>

{% endblock %}
