{% extends "layouts/base.html" %}

{% block content %}

<div class="card">

    <div class="card-header">

        <h3 class="card-title">
            Purchase List
        </h3>

        <a href="/purchase" class="btn btn-primary float-right">
            New Purchase
        </a>

    </div>

    <div class="card-body table-responsive">

        <table class="table table-bordered table-striped">

            <thead>

                <tr>

                    <th>No</th>

                    <th>Supplier</th>

                    <th>Total</th>

                    <th>Payment</th>

                    <th width="180">Actions</th>

                </tr>

            </thead>

            <tbody>

                {% for purchase in purchases %}

                <tr>

                    <td>{{ purchase.purchase_no }}</td>

                    <td>{{ purchase.supplier_id }}</td>

                    <td>₹ {{ purchase.grand_total }}</td>

                    <td>{{ purchase.payment_mode }}</td>

                    <td class="text-center">

                        <div class="btn-group">

                            <a href="/purchase/view/{{ purchase.id }}"
                               class="btn btn-info btn-sm"
                               title="View">

                                <i class="fas fa-eye"></i>

                            </a>

                            <a href="/purchase/edit/{{ purchase.id }}"
                               class="btn btn-warning btn-sm"
                               title="Edit">

                                <i class="fas fa-edit"></i>

                            </a>

                            <a href="/purchase/delete/{{ purchase.id }}"
                               class="btn btn-danger btn-sm"
                               title="Delete"
                               onclick="return confirm('Delete this purchase?')">

                                <i class="fas fa-trash"></i>

                            </a>

                        </div>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
