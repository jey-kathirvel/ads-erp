{% extends "layouts/base.html" %}

{% block content %}

<div class="card">

<div class="card-header bg-primary">

<h3>

Company Settings

</h3>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-6">

<label>

Company Name

</label>

<input
class="form-control"
value="{{ company.company_name if company else '' }}">

</div>

<div class="col-md-6">

<label>

GSTIN

</label>

<input
class="form-control"
value="{{ company.gstin if company else '' }}">

</div>

</div>

<br>

<div class="row">

<div class="col-md-12">

<label>

Address

</label>

<textarea
class="form-control">{{ company.address if company else '' }}</textarea>

</div>

</div>

<br>

<button class="btn btn-primary">

Save Settings

</button>

</div>

</div>

{% endblock %}
