{% extends "layouts/base.html" %}

{% block content %}

<form method="post" action="/suppliers/create">

<div class="card">

    <div class="card-header bg-primary">

        <h3 class="card-title">

            Add Supplier

        </h3>

    </div>

    <div class="card-body">

        <div class="row">

            <div class="col-md-6">

                <label>Supplier Name</label>

                <input
                    name="supplier_name"
                    class="form-control"
                    required>

            </div>

            <div class="col-md-6">

                <label>Contact Person</label>

                <input
                    name="contact_person"
                    class="form-control">

            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-4">

                <label>Mobile</label>

                <input
                    name="mobile"
                    class="form-control">

            </div>

            <div class="col-md-4">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    class="form-control">

            </div>

            <div class="col-md-4">

                <label>GSTIN</label>

                <input
                    name="gstin"
                    class="form-control">

            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-6">

                <label>Address Line 1</label>

                <input
                    name="address1"
                    class="form-control">

            </div>

            <div class="col-md-6">

                <label>Address Line 2</label>

                <input
                    name="address2"
                    class="form-control">

            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-4">

                <label>City</label>

                <input
                    name="city"
                    class="form-control">

            </div>

            <div class="col-md-4">

                <label>State</label>

                <input
                    name="state"
                    class="form-control">

            </div>

            <div class="col-md-4">

                <label>Pincode</label>

                <input
                    name="pincode"
                    class="form-control">

            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-4">

                <label>Opening Balance</label>

                <input
                    type="number"
                    step="0.01"
                    value="0"
                    name="opening_balance"
                    class="form-control">

            </div>

        </div>

    </div>

    <div class="card-footer">

        <button
            class="btn btn-primary">

            <i class="fas fa-save"></i>

            Save Supplier

        </button>

        <a
            href="/suppliers"
            class="btn btn-secondary">

            Cancel

        </a>

    </div>

</div>

</form>

{% endblock %}
