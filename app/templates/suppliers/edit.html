{% extends "layouts/base.html" %}

{% block content %}

<form method="post" action="/suppliers/{{ supplier.id }}/edit">

<div class="card">

    <div class="card-header bg-warning">

        <h3 class="card-title">

            Edit Supplier

        </h3>

    </div>

    <div class="card-body">

        <div class="row">

            <div class="col-md-6">

                <label>Supplier Name</label>

                <input
                    name="supplier_name"
                    class="form-control"
                    value="{{ supplier.supplier_name }}"
                    required>

            </div>

            <div class="col-md-6">

                <label>Contact Person</label>

                <input
                    name="contact_person"
                    class="form-control"
                    value="{{ supplier.contact_person }}">

            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-4">

                <label>Mobile</label>

                <input
                    name="mobile"
                    class="form-control"
                    value="{{ supplier.mobile }}">

            </div>

            <div class="col-md-4">

                <label>Email</label>

                <input
                    name="email"
                    class="form-control"
                    value="{{ supplier.email }}">

            </div>

            <div class="col-md-4">

                <label>GSTIN</label>

                <input
                    name="gstin"
                    class="form-control"
                    value="{{ supplier.gstin }}">

            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-6">

                <label>Address1</label>

                <input
                    name="address1"
                    class="form-control"
                    value="{{ supplier.address1 }}">

            </div>

            <div class="col-md-6">

                <label>Address2</label>

                <input
                    name="address2"
                    class="form-control"
                    value="{{ supplier.address2 }}">

            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-4">

                <label>City</label>

                <input
                    name="city"
                    class="form-control"
                    value="{{ supplier.city }}">

            </div>

            <div class="col-md-4">

                <label>State</label>

                <input
                    name="state"
                    class="form-control"
                    value="{{ supplier.state }}">

            </div>

            <div class="col-md-4">

                <label>Pincode</label>

                <input
                    name="pincode"
                    class="form-control"
                    value="{{ supplier.pincode }}">

            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-4">

                <label>Opening Balance</label>

                <input
                    type="number"
                    step="0.01"
                    name="opening_balance"
                    class="form-control"
                    value="{{ supplier.opening_balance }}">

            </div>

        </div>

    </div>

    <div class="card-footer">

        <button class="btn btn-primary">

            <i class="fas fa-save"></i>

            Update Supplier

        </button>

        <a href="/suppliers"
           class="btn btn-secondary">

            Cancel

        </a>

    </div>

</div>

</form>

{% endblock %}
