{% extends "layouts/base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card card-primary">

            <div class="card-header">

                <h3 class="card-title">

                    <i class="fas fa-user-plus"></i>

                    Add User

                </h3>

            </div>

            <form
                action="/users/create"
                method="post">

                <div class="card-body">

                    <div class="form-group">

                        <label>

                            Full Name

                        </label>

                        <input
                            type="text"
                            name="full_name"
                            class="form-control"
                            placeholder="Enter Full Name"
                            required>

                    </div>

                    <div class="form-group">

                        <label>

                            Email

                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Enter Email"
                            required>

                    </div>

                    <div class="row">

                        <div class="col-md-6">

                            <div class="form-group">

                                <label>

                                    Password

                                </label>

                                <input
                                    type="password"
                                    name="password"
                                    class="form-control"
                                    placeholder="Password"
                                    required>

                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="form-group">

                                <label>

                                    Confirm Password

                                </label>

                                <input
                                    type="password"
                                    name="confirm_password"
                                    class="form-control"
                                    placeholder="Confirm Password"
                                    required>

                            </div>

                        </div>

                    </div>

                    <div class="form-group">

                        <label>

                            Role

                        </label>

                        <select
                            name="role_id"
                            class="form-control"
                            required>

                            <option value="">

                                Select Role

                            </option>

                            {% for role in roles %}

                            <option value="{{ role.id }}">

                                {{ role.role_name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="form-group">

                        <label>

                            Status

                        </label>

                        <select
                            name="is_active"
                            class="form-control">

                            <option value="true">

                                Active

                            </option>

                            <option value="false">

                                Inactive

                            </option>

                        </select>

                    </div>

                </div>

                <div class="card-footer text-right">

                    <a
                        href="/users"
                        class="btn btn-secondary">

                        <i class="fas fa-arrow-left"></i>

                        Back

                    </a>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        <i class="fas fa-save"></i>

                        Save User

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script>

document.querySelector("form").addEventListener(

    "submit",

    function(e){

        let pwd=document.getElementsByName("password")[0].value;

        let cpwd=document.getElementsByName("confirm_password")[0].value;

        if(pwd!==cpwd){

            alert("Password and Confirm Password should match.");

            e.preventDefault();

        }

    }

);

</script>

{% endblock %}
